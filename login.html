<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

                        "on-surface-variant": "#444748",
                        "inverse-surface": "#303031",

                        "on-secondary-fixed": "#261900",

                        "surface-container-highest": "#e4e2e2",
                        "primary": "#000000",
                        "on-tertiary-fixed": "#1a1c1c",

                        "surface-variant": "#e4e2e2",

                        "background": "#fbf9f8",
                        "secondary-fixed": "#ffdea5",
                        "on-primary-fixed-variant": "#474746",
                        "error": "#ba1a1a",
                        "on-primary-fixed": "#1c1b1b",

                        "secondary": "#775a19",

                        "error-container": "#ffdad6",
                        "secondary-container": "#fed488",

                        "surface-dim": "#dbdad9",

                        "outline": "#747878"
                    },
                    "borderRadius": {
                        "DEFAULT": "0px",
                        "lg": "0px",

                    },
                    "spacing": {
                        "unit": "8px",
                        "gutter": "24px",
                        "margin-mobile": "16px",
                        "container-max": "1440px",
                        "margin-desktop": "40px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Libre Caslon Text"],
                        "body-sm": ["Hanken Grotesk"],
                        "body-md": ["Hanken Grotesk"],

                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .form-input-focus:focus {
            outline: none;
            border-bottom-color: #C5A059;
        }
        .fade-in {
            animation: fadeIn 1s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md overflow-hidden">
<main class="flex min-h-screen">
<!-- Left Section: Visual Anchor -->
<section class="hidden lg:flex lg:w-1/2 relative overflow-hidden bg-primary-container">
<img alt="Modern Virtual Art Installation" class="absolute inset-0 w-full h-full object-cover opacity-80" data-alt="A striking minimalist virtual art gallery showcasing a large-scale abstract sculpture made of brushed obsidian and gold filaments. The environment is vast with high white walls and polished concrete floors that reflect the soft, overhead gallery lighting. The aesthetic is contemporary and elite, characterized by a clean light-mode atmosphere with stark black accents, embodying a sense of silent prestige and focused curatorial precision." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA8E7A1lL8wakPPG9nppeU2TlzP2qWEcGtadv1qSjDpGCWoqblWOUB6r6O3bReo_LbpNfQ4942_PWDAhS58QfU5XZt2akyhSNGZ2ZWi8lG6GIrODmCDEnJky21_aooBXi3R4oR_EjoF_wMm_LnS3hmVwoY69sbe61Re2DQdiQkKKMasbAfrbYooqfsa_ADCqreqih_D4fyh2qa-iLPBMLgsx3wR1-aJKH5lmID3m6pb42uXnC3H_ycgWZRbSbOCdywLkK3vAkXyrDk"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
<div class="relative z-10 mt-auto p-margin-desktop mb-margin-desktop text-white">
<h1 class="font-display-lg text-display-lg mb-unit">Obsidian Gallery</h1>
<p class="font-headline-sm text-headline-sm opacity-90 max-w-md">Excellence in Digital Exhibition Management.</p>
<div class="mt-gutter flex items-center gap-unit">
<span class="w-12 h-[1px] bg-white opacity-50"></span>
<span class="font-label-md text-label-md uppercase tracking-widest opacity-70">Curated Intelligence</span>
</div>
</div>
</section>
<!-- Right Section: Login Form -->
<section class="w-full lg:w-1/2 flex flex-col justify-center items-center px-margin-mobile md:px-margin-desktop bg-surface-container-lowest">
<div class="w-full max-w-[440px] fade-in">
<!-- Branding Header -->
<header class="mb-12 text-center lg:text-left">
<div class="font-headline-md text-headline-md font-bold text-primary mb-2">Gallery Admin</div>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to manage your digital collection.</p>
</header>
<!-- Role Toggle -->
<div class="flex mb-8 border-b border-outline-variant">
<button class="flex-1 pb-4 font-label-md text-label-md uppercase transition-all border-b-2 border-primary text-primary" id="admin-toggle" onclick="setRole('admin')">Admin</button>
<button class="flex-1 pb-4 font-label-md text-label-md uppercase transition-all border-b-2 border-transparent text-on-surface-variant hover:text-primary" id="artist-toggle" onclick="setRole('artist')">Artist</button>
</div>
<!-- Form -->
<form class="space-y-gutter" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant uppercase" for="email">Institutional Email</label>
<input class="w-full bg-transparent border-t-0 border-l-0 border-r-0 border-b border-primary py-3 px-0 font-body-md text-body-md form-input-focus placeholder:opacity-30 transition-all" id="email" placeholder="curator@obsidian.gallery" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-1">
<div class="flex justify-between items-end">
<label class="font-label-md text-label-md text-on-surface-variant uppercase" for="password">Access Key</label>
<a class="font-label-md text-label-md text-secondary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full bg-transparent border-t-0 border-l-0 border-r-0 border-b border-primary py-3 px-0 font-body-md text-body-md form-input-focus placeholder:opacity-30 transition-all" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-0 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- CTA Actions -->
<div class="pt-4 space-y-gutter">
<button class="w-full h-[56px] bg-primary text-white font-label-md text-label-md uppercase tracking-widest hover:bg-black transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span>Log In</span>
<span class="material-symbols-outlined text-[18px]">chevron_right</span>
</button>
<button class="w-full h-[56px] border border-secondary text-secondary font-label-md text-label-md uppercase tracking-widest hover:bg-secondary/5 transition-all flex items-center justify-center gap-2">
<span id="cta-label">Publish Exhibition</span>
</button>
</div>
</form>
<!-- Footer Links -->
<footer class="mt-12 pt-gutter border-t border-outline-variant flex flex-col md:flex-row justify-between items-center gap-4">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                        New to the platform? 
                        <a class="text-primary font-bold hover:underline" href="#">Join as Artist</a>
</p>
<div class="flex gap-4">
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors uppercase" href="#">Support</a>
<span class="text-outline-variant">•</span>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors uppercase" href="#">Terms</a>
</div>
</footer>
</div>
</section>
</main>
<script>
        function setRole(role) {
            const adminBtn = document.getElementById('admin-toggle');
            const artistBtn = document.getElementById('artist-toggle');
            const ctaLabel = document.getElementById('cta-label');
            const emailInput = document.getElementById('email');

            if (role === 'admin') {
                adminBtn.classList.add('border-primary', 'text-primary');
                adminBtn.classList.remove('border-transparent', 'text-on-surface-variant');
                artistBtn.classList.remove('border-primary', 'text-primary');
                artistBtn.classList.add('border-transparent', 'text-on-surface-variant');
                ctaLabel.innerText = 'Publish Exhibition';
                emailInput.placeholder = 'curator@obsidian.gallery';
            } else {
                artistBtn.classList.add('border-primary', 'text-primary');
                artistBtn.classList.remove('border-transparent', 'text-on-surface-variant');
                adminBtn.classList.remove('border-primary', 'text-primary');
                adminBtn.classList.add('border-transparent', 'text-on-surface-variant');
                ctaLabel.innerText = 'Request Portfolio Review';
                emailInput.placeholder = 'artist@creative.studio';
            }
        }

        // Simple parallax effect on background
        document.addEventListener('mousemove', (e) => {
            const img = document.querySelector('[src="image-login-curatorial-bg"]');
            if (!img) return;
            const x = (window.innerWidth - e.pageX * 2) / 100;
            const y = (window.innerHeight - e.pageY * 2) / 100;
            img.style.transform = `scale(1.05) translate(${x}px, ${y}px)`;
        });
    </script>
</body></html>
